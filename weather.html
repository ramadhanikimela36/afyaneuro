<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .search-box input {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            width: 300px;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .search-box input:focus {
            outline: none;
            transform: scale(1.02);
        }

        .search-box button {
            padding: 12px 30px;
            background: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, background 0.2s;
        }

        .search-box button:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .weather-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .weather-card.current {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .city-name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .weather-icon {
            font-size: 4rem;
        }

        .temperature {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .description {
            font-size: 1.1rem;
            opacity: 0.9;
            text-transform: capitalize;
            margin-bottom: 10px;
        }

        .feels-like {
            font-size: 0.95rem;
            opacity: 0.85;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .detail-item {
            background: rgba(0,0,0,0.1);
            padding: 15px;
            border-radius: 10px;
        }

        .weather-card.current .detail-item {
            background: rgba(255,255,255,0.2);
        }

        .detail-label {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-value {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .forecast {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .forecast h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .forecast-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.2s;
        }

        .forecast-item:hover {
            transform: scale(1.05);
        }

        .forecast-time {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .forecast-icon {
            font-size: 2rem;
            margin: 10px 0;
        }

        .forecast-temp {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .saved-cities {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
            justify-content: center;
        }

        .saved-city-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .saved-city-btn:hover {
            background: white;
            color: #667eea;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .search-box input {
                width: 100%;
            }

            .weather-grid {
                grid-template-columns: 1fr;
            }

            .weather-card.current {
                grid-column: 1;
            }

            .forecast-grid {
                grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>Check the weather anywhere in the world</p>
        </header>

        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Enter city name..." 
                onkeypress="handleKeyPress(event)"
            >
            <button onclick="searchWeather()">Search</button>
        </div>

        <div id="savedCities" class="saved-cities"></div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <div id="weatherContainer"></div>
        <div id="forecastContainer"></div>
    </div>

    <script>
        const API_KEY = '9d1b34f53d8c4157a832d2b1b2e14365'; // OpenWeatherMap API key
        const SAVED_CITIES_KEY = 'savedWeatherCities';

        // Weather icon mapping
        const iconMap = {
            '01d': '☀️', '01n': '🌙',
            '02d': '⛅', '02n': '🌤️',
            '03d': '☁️', '03n': '☁️',
            '04d': '☁️', '04n': '☁️',
            '09d': '🌧️', '09n': '🌧️',
            '10d': '🌦️', '10n': '🌧️',
            '11d': '⛈️', '11n': '⛈️',
            '13d': '❄️', '13n': '❄️',
            '50d': '🌫️', '50n': '🌫️'
        };

        // Load saved cities on page load
        window.addEventListener('load', () => {
            loadSavedCities();
            // Fetch weather for default city
            searchWeatherByCity('New York');
        });

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchWeather();
            }
        }

        function searchWeather() {
            const city = document.getElementById('searchInput').value.trim();
            if (city) {
                searchWeatherByCity(city);
            }
        }

        async function searchWeatherByCity(city) {
            showLoading(true);
            hideError();

            try {
                // Fetch current weather
                const weatherResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`
                );

                if (!weatherResponse.ok) {
                    throw new Error('City not found');
                }

                const weatherData = await weatherResponse.json();

                // Fetch 5-day forecast
                const forecastResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${API_KEY}`
                );

                const forecastData = await forecastResponse.json();

                displayWeather(weatherData);
                displayForecast(forecastData);

                // Save city to favorites
                addSavedCity(city);

                document.getElementById('searchInput').value = '';
            } catch (error) {
                showError(error.message);
            } finally {
                showLoading(false);
            }
        }

        function displayWeather(data) {
            const { main, weather, wind, clouds, sys, coord } = data;
            const icon = iconMap[weather[0].icon] || '🌤️';

            const html = `
                <div class="weather-grid">
                    <div class="weather-card current">
                        <div class="city-name">${data.name}, ${data.sys.country}</div>
                        <div class="weather-main">
                            <div class="weather-icon">${icon}</div>
                            <div>
                                <div class="temperature">${Math.round(main.temp)}°C</div>
                                <div class="description">${weather[0].description}</div>
                                <div class="feels-like">Feels like ${Math.round(main.feels_like)}°C</div>
                            </div>
                        </div>
                        <div class="weather-details">
                            <div class="detail-item">
                                <div class="detail-label">Humidity</div>
                                <div class="detail-value">${main.humidity}%</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Pressure</div>
                                <div class="detail-value">${main.pressure} hPa</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Wind Speed</div>
                                <div class="detail-value">${wind.speed} m/s</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Cloud Coverage</div>
                                <div class="detail-value">${clouds.all}%</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">High</div>
                                <div class="detail-value">${Math.round(main.temp_max)}°C</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Low</div>
                                <div class="detail-value">${Math.round(main.temp_min)}°C</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('weatherContainer').innerHTML = html;
        }

        function displayForecast(data) {
            const forecastItems = data.list
                .filter((item, index) => index % 8 === 0) // Get every 24 hours
                .slice(0, 5); // Next 5 days

            const html = `
                <div class="forecast">
                    <h2>5-Day Forecast</h2>
                    <div class="forecast-grid">
                        ${forecastItems.map(item => {
                            const date = new Date(item.dt * 1000);
                            const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                            const icon = iconMap[item.weather[0].icon] || '🌤️';
                            return `
                                <div class="forecast-item">
                                    <div class="forecast-time">${dayName}</div>
                                    <div class="forecast-icon">${icon}</div>
                                    <div class="forecast-temp">${Math.round(item.main.temp)}°C</div>
                                    <div style="font-size: 0.8rem; opacity: 0.9;">${item.weather[0].main}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;

            document.getElementById('forecastContainer').innerHTML = html;
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = `⚠️ ${message}`;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        function addSavedCity(city) {
            let saved = JSON.parse(localStorage.getItem(SAVED_CITIES_KEY)) || [];
            if (!saved.includes(city)) {
                saved.unshift(city);
                if (saved.length > 5) saved.pop();
                localStorage.setItem(SAVED_CITIES_KEY, JSON.stringify(saved));
            }
            loadSavedCities();
        }

        function loadSavedCities() {
            const saved = JSON.parse(localStorage.getItem(SAVED_CITIES_KEY)) || [];
            const container = document.getElementById('savedCities');
            
            container.innerHTML = '<p style="color: white; width: 100%; text-align: center; margin: 0;">Saved Cities:</p>' + 
                saved.map(city => 
                    `<button class="saved-city-btn" onclick="searchWeatherByCity('${city}')">${city}</button>`
                ).join('');
        }
    </script>
</body>
</html>
